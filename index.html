<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌊 As Aventuras de Pérola - Com Imagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #4A90D9 50%, #2C5F8A 100%);
            touch-action: none;
            cursor: pointer;
        }
        
        #start {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        #start .logo { font-size: 4.5rem; animation: float 2s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        
        #start h1 {
            font-size: 2.5rem;
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            margin: 8px 0;
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        
        #start .sub {
            font-size: 1rem;
            color: #87CEEB;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        
        #start button {
            padding: 16px 50px;
            font-size: 1.4rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #FF6B6B, #FF4757);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 6px 0;
            transition: all 0.2s ease;
            box-shadow: 0 8px 30px rgba(255, 71, 87, 0.3);
            min-height: 60px;
            min-width: 200px;
            touch-action: manipulation;
        }
        
        #start button:active { transform: scale(0.95); }
        
        .controls-info {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            margin-top: 15px;
            text-align: center;
            line-height: 2;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            max-width: 320px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        
        .controls-info .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 10px;
            border-radius: 8px;
            font-weight: bold;
            color: #fff;
            margin: 0 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #info {
            position: fixed;
            top: 12px;
            left: 12px;
            color: white;
            font-size: 1.4rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 14px;
            border-radius: 30px;
            z-index: 50;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        #score {
            position: fixed;
            top: 12px;
            right: 12px;
            color: white;
            font-size: 1.4rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 14px;
            border-radius: 30px;
            z-index: 50;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        #gameover {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 0, 0, 0.92);
            padding: 30px 25px;
            border-radius: 30px;
            text-align: center;
            border: 3px solid #FFD700;
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            width: 85%;
            max-width: 350px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        #gameover.show { transform: translate(-50%, -50%) scale(1); }
        #gameover .emoji { font-size: 3.5rem; display: block; animation: float 2s ease-in-out infinite; }
        #gameover h1 { color: #FFD700; font-size: 2rem; margin: 8px 0; font-family: 'Comic Sans MS', cursive, sans-serif; }
        #gameover .fscore { color: #87CEEB; font-size: 1.2rem; margin: 12px 0; font-family: 'Comic Sans MS', cursive, sans-serif; }
        #gameover .fscore span { color: #FFD700; font-size: 2rem; }
        #gameover button {
            padding: 14px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            transition: all 0.2s ease;
            min-height: 50px;
            min-width: 150px;
            touch-action: manipulation;
        }
        #gameover button:active { transform: scale(0.95); }
        
        @media (max-width: 400px) {
            #start h1 { font-size: 2rem; }
            #start .logo { font-size: 3.5rem; }
            #start button { font-size: 1.1rem; padding: 14px 30px; min-height: 50px; min-width: 160px; }
            #info, #score { font-size: 1rem; padding: 4px 10px; top: 8px; }
            #gameover { padding: 20px; width: 90%; }
            #gameover h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="start">
        <div class="logo">🌊</div>
        <h1>As Aventuras de Pérola</h1>
        <div class="sub">🐚 Com imagens personalizadas!</div>
        <button onclick="iniciarJogo()">🎮 Começar</button>
        <div class="controls-info">
            📱 <span class="key">Toque</span> para pular<br>
            👆 <span class="key">Arraste</span> para mover<br>
            ⭐ Estrelas douradas valem +5
        </div>
    </div>

    <!-- UI -->
    <div id="info">❤️ <span id="vidas">3</span></div>
    <div id="score">⭐ <span id="pts">0</span></div>

    <!-- GAME OVER -->
    <div id="gameover">
        <span class="emoji">💫</span>
        <h1>Fim de Jogo!</h1>
        <div class="fscore">⭐ Estrelas: <span id="final">0</span></div>
        <button onclick="reiniciar()">🔄 Jogar Novamente</button>
    </div>

    <!-- CANVAS -->
    <canvas id="canvas"></canvas>

    <script>
        // ============================================================
        // CANVAS
        // ============================================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function redimensionar() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        redimensionar();
        window.addEventListener('resize', redimensionar);

        // ============================================================
        // CARREGAR IMAGENS DA PÉROLA
        // ============================================================
        // ⚠️ ALTERE AQUI O CAMINHO DAS SUAS IMAGENS
        const PASTA_IMAGENS = './'; // ou './imagens/' se estiver em uma pasta
        
        const imagens = {
            pulando: new Image(),
            andando: new Image(),
            correndoesquerda: new Image(),
            passolargo: new Image(),
            escalando: new Image(),
            correndodireita: new Image()
        };

        // Configuração de cada imagem
        const CONFIG_IMAGENS = {
            pulando: {
                src: PASTA_IMAGENS + 'pulando.png',
                largura: 50,
                altura: 60
            },
            andando: {
                src: PASTA_IMAGENS + 'andando.png',
                largura: 50,
                altura: 60
            },
            correndoesquerda: {
                src: PASTA_IMAGENS + 'correndoesquerda.png',
                largura: 50,
                altura: 60
            },
            passolargo: {
                src: PASTA_IMAGENS + 'passolargo.png',
                largura: 50,
                altura: 60
            },
            escalando: {
                src: PASTA_IMAGENS + 'escalando.png',
                largura: 50,
                altura: 60
            },
            correndodireita: {
                src: PASTA_IMAGENS + 'correndodireita.png',
                largura: 50,
                altura: 60
            }
        };

        // Carrega as imagens
        let imagensCarregadas = 0;
        const totalImagens = Object.keys(imagens).length;

        for (const [nome, img] of Object.entries(imagens)) {
            const config = CONFIG_IMAGENS[nome];
            img.src = config.src;
            img.onload = () => {
                imagensCarregadas++;
                console.log(`✅ Imagem "${nome}" carregada!`);
                if (imagensCarregadas >= totalImagens) {
                    console.log('🎉 Todas as imagens carregadas!');
                }
            };
            img.onerror = () => {
                console.warn(`⚠️ Erro ao carregar "${nome}" - usando fallback`);
                imagensCarregadas++;
                // Cria imagem fallback (personagem simples)
                criarFallback(nome);
            };
        }

        // ============================================================
        // FALLBACK (se a imagem não carregar)
        // ============================================================
        function criarFallback(nome) {
            const canvasTemp = document.createElement('canvas');
            canvasTemp.width = 100;
            canvasTemp.height = 120;
            const ctxTemp = canvasTemp.getContext('2d');
            
            // Desenha um personagem simples
            ctxTemp.fillStyle = '#FF6B6B';
            ctxTemp.beginPath();
            ctxTemp.arc(50, 40, 30, 0, Math.PI * 2);
            ctxTemp.fill();
            
            ctxTemp.fillStyle = '#FFD5C2';
            ctxTemp.beginPath();
            ctxTemp.arc(50, 35, 20, 0, Math.PI * 2);
            ctxTemp.fill();
            
            ctxTemp.fillStyle = '#2C3E50';
            ctxTemp.beginPath();
            ctxTemp.arc(40, 33, 3, 0, Math.PI * 2);
            ctxTemp.fill();
            ctxTemp.beginPath();
            ctxTemp.arc(60, 33, 3, 0, Math.PI * 2);
            ctxTemp.fill();
            
            ctxTemp.fillStyle = '#FFD700';
            ctxTemp.beginPath();
            ctxTemp.arc(50, 70, 20, 0, Math.PI);
            ctxTemp.fill();
            
            const imgFallback = new Image();
            imgFallback.src = canvasTemp.toDataURL();
            imagens[nome] = imgFallback;
        }

        // ============================================================
        // JOGO
        // ============================================================
        let rodando = false;
        let pontos = 0;
        let vidas = 3;
        let frame = 0;
        let estrelas = [];
        let obstaculos = [];
        let particulas = [];
        let animId = null;
        let timerEstrelas = 0;
        let timerObstaculos = 0;
        let toqueX = null;

        // ============================================================
        // PÉROLA COM IMAGENS
        // ============================================================
        const perola = {
            x: 80,
            y: 0,
            w: 50,
            h: 60,
            vy: 0,
            gravidade: 0.5,
            pulo: -11,
            noChao: false,
            visivel: true,
            direcao: 'direita', // 'direita' ou 'esquerda'
            estado: 'parada', // 'parada', 'andando', 'correndo', 'pulando', 'escalando'
            velocidadeX: 0,
            timerAnimacao: 0,

            reset() {
                this.x = 80;
                this.y = H - 130;
                this.vy = 0;
                this.noChao = false;
                this.visivel = true;
                this.direcao = 'direita';
                this.estado = 'parada';
                this.velocidadeX = 0;
            },

            // === FUNÇÃO PRINCIPAL PARA DESENHAR ===
            desenhar() {
                if (!this.visivel) return;

                // Define qual imagem usar baseado no estado e direção
                let img = this.selecionarImagem();

                // Se a imagem não estiver pronta, usa fallback
                if (!img || !img.complete || img.naturalWidth === 0) {
                    this.desenharFallback();
                    return;
                }

                // Desenha a imagem
                ctx.save();

                // Vira a imagem se estiver indo para esquerda
                if (this.direcao === 'esquerda' && 
                    (this.estado === 'andando' || this.estado === 'parada' || this.estado === 'pulando')) {
                    ctx.translate(this.x + this.w, this.y);
                    ctx.scale(-1, 1);
                    ctx.drawImage(img, 0, 0, this.w, this.h);
                } else {
                    ctx.drawImage(img, this.x, this.y, this.w, this.h);
                }

                ctx.restore();

                // Anima o personagem (troca de quadros se a imagem tiver múltiplos)
                this.timerAnimacao++;
                if (this.timerAnimacao > 10) {
                    this.timerAnimacao = 0;
                }
            },

            // === SELECIONA A IMAGEM CORRETA ===
            selecionarImagem() {
                // Se estiver pulando
                if (this.estado === 'pulando') {
                    return imagens.pulando;
                }

                // Se estiver escalando
                if (this.estado === 'escalando') {
                    return imagens.escalando;
                }

                // Se estiver correndo
                if (this.estado === 'correndo') {
                    if (this.direcao === 'direita') {
                        return imagens.correndodireita;
                    } else {
                        return imagens.correndoesquerda;
                    }
                }

                // Se estiver andando
                if (this.estado === 'andando') {
                    // Alterna entre andando e passolargo para dar efeito de caminhada
                    if (Math.floor(this.timerAnimacao / 5) % 2 === 0) {
                        return imagens.andando;
                    } else {
                        return imagens.passolargo;
                    }
                }

                // Parado - usa imagem padrão
                return imagens.andando;
            },

            // === FALLBACK: Desenha com canvas ===
            desenharFallback() {
                ctx.save();

                // Vestido
                const grad = ctx.createRadialGradient(
                    this.x + 8, this.y + 12, 3,
                    this.x + 20, this.y + 30, 28
                );
                grad.addColorStop(0, '#FF8A8A');
                grad.addColorStop(1, '#E74C6F');

                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 8;

                ctx.beginPath();
                ctx.ellipse(this.x + this.w / 2, this.y + this.h * 0.55,
                    this.w * 0.32, this.h * 0.38, 0, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = '#CC4466';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Cabeça
                ctx.shadowBlur = 4;
                const cx = this.x + this.w / 2;
                const cy = this.y + 14;
                const raio = 16;

                ctx.beginPath();
                ctx.arc(cx, cy, raio, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD5C2';
                ctx.fill();
                ctx.strokeStyle = '#E8B89A';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Cabelo
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.arc(cx - 4, cy - 10, 9, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 4, cy - 10, 9, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx, cy - 13, 11, 0, Math.PI * 2);
                ctx.fill();

                // Olhos
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.ellipse(cx - 5, cy, 3.5, 4.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + 5, cy, 3.5, 4.5, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.arc(cx - 3.5, cy + 0.5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 6.5, cy + 0.5, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(cx - 4, cy - 1, 1, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 5.5, cy - 1, 1, 0, Math.PI * 2);
                ctx.fill();

                // Boca
                ctx.beginPath();
                ctx.arc(cx, cy + 4.5, 5, 0.1, Math.PI - 0.1);
                ctx.strokeStyle = '#CC4466';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Bochechas
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(cx - 10, cy + 2.5, 3.5, 2.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + 10, cy + 2.5, 3.5, 2.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                // Braços
                ctx.fillStyle = '#F5C4A8';
                ctx.beginPath();
                ctx.ellipse(this.x + 4, this.y + 28, 3.5, 7, 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(this.x + this.w - 4, this.y + 28, 3.5, 7, -0.3, 0, Math.PI * 2);
                ctx.fill();

                // Sapatos
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(this.x + 7, this.y + this.h - 2, 7, 3.5, 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(this.x + this.w - 7, this.y + this.h - 2, 7, 3.5, -0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
                ctx.shadowBlur = 0;
            },

            // === ATUALIZA O ESTADO BASEADO NA AÇÃO ===
            atualizarEstado() {
                const velocidade = Math.abs(this.velocidadeX);

                // Se estiver pulando
                if (!this.noChao) {
                    this.estado = 'pulando';
                    return;
                }

                // Se estiver se movendo rápido (correndo)
                if (velocidade > 3) {
                    this.estado = 'correndo';
                    return;
                }

                // Se estiver se movendo devagar (andando)
                if (velocidade > 0.5) {
                    this.estado = 'andando';
                    return;
                }

                // Parado
                this.estado = 'parada';
            }
        };

        // ============================================================
        // ESTRELAS
        // ============================================================
        function criarEstrela() {
            return {
                x: W + 20,
                y: 60 + Math.random() * (H - 180),
                raio: 10 + Math.random() * 7,
                vel: 1.5 + Math.random() * 1.8,
                rot: Math.random() * Math.PI * 2,
                coletada: false,
                dourada: Math.random() > 0.75,
                tam: Math.random() > 0.75 ? 1.3 : 1
            };
        }

        function desenharEstrela(e) {
            if (e.coletada) return;
            ctx.save();
            ctx.translate(e.x, e.y);
            ctx.rotate(e.rot);
            ctx.scale(e.tam, e.tam);

            const pts = 5;
            const outer = e.raio;
            const inner = e.raio * 0.4;

            ctx.beginPath();
            for (let i = 0; i < pts * 2; i++) {
                const r = i % 2 === 0 ? outer : inner;
                const a = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
                if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }
            ctx.closePath();

            const grad = ctx.createRadialGradient(-2, -2, 0, 0, 0, e.raio);
            grad.addColorStop(0, '#FFE066');
            grad.addColorStop(0.6, '#FFD700');
            grad.addColorStop(1, '#FFA500');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            if (e.dourada) {
                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.arc(-2.5, -1.5, 1.8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(2.5, -1.5, 1.8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(0, 1, 2.5, 0.1, Math.PI - 0.1);
                ctx.strokeStyle = '#2C3E50';
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }

            ctx.restore();
        }

        // ============================================================
        // OBSTÁCULOS
        // ============================================================
        function criarObstaculo() {
            return {
                x: W + 20,
                y: H - 130 - Math.random() * 65,
                w: 22 + Math.random() * 18,
                h: 22 + Math.random() * 18,
                vel: 1.8 + Math.random() * 1.8,
                tipo: Math.random() > 0.5 ? 'espinho' : 'agua',
                rot: 0,
                off: Math.random() * Math.PI * 2
            };
        }

        function desenharObstaculo(o) {
            ctx.save();
            ctx.translate(o.x + o.w / 2, o.y + o.h / 2);
            ctx.rotate(o.rot);

            if (o.tipo === 'espinho') {
                const pts = 5;
                const outer = o.w / 2;
                const inner = outer * 0.35;

                ctx.beginPath();
                for (let i = 0; i < pts * 2; i++) {
                    const r = i % 2 === 0 ? outer : inner;
                    const a = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
                    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                }
                ctx.closePath();

                const grad = ctx.createRadialGradient(-2, -2, 0, 0, 0, outer);
                grad.addColorStop(0, '#FF6B8A');
                grad.addColorStop(0.5, '#FF4757');
                grad.addColorStop(1, '#C0392B');
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = '#A93226';
                ctx.lineWidth = 1.2;
                ctx.stroke();

                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(-4, -2.5, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(4, -2.5, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.arc(-3.5, -1.5, 1.8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(4.5, -1.5, 1.8, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = 'rgba(200,230,255,0.25)';
                ctx.beginPath();
                ctx.arc(0, 0, o.w / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(150,200,255,0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();

                for (let i = 0; i < 5; i++) {
                    const a = (i / 5) * Math.PI * 2 + o.off;
                    const len = 8 + Math.sin(frame * 0.04 + i) * 4;
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(a) * o.w / 2 * 0.4, Math.sin(a) * o.w / 2 * 0.4);
                    ctx.quadraticCurveTo(
                        Math.cos(a) * (o.w / 2 + len * 0.3),
                        Math.sin(a) * (o.w / 2 + len * 0.3) + 4,
                        Math.cos(a) * (o.w / 2 + len),
                        Math.sin(a) * (o.w / 2 + len) + 8
                    );
                    ctx.strokeStyle = 'rgba(150,200,255,0.2)';
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }

                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.arc(-2.5, -1.5, 1.8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(2.5, -1.5, 1.8, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        // ============================================================
        // PARTÍCULAS
        // ============================================================
        function adicionarParticulas(x, y, cor, qtd = 12) {
            for (let i = 0; i < qtd; i++) {
                const a = Math.random() * Math.PI * 2;
                const s = 1 + Math.random() * 3.5;
                particulas.push({
                    x,
                    y,
                    vx: Math.cos(a) * s,
                    vy: Math.sin(a) * s - 1,
                    life: 1,
                    decay: 0.01 + Math.random() * 0.02,
                    raio: 2 + Math.random() * 4,
                    cor: cor || '#FFD700'
                });
            }
        }

        // ============================================================
        // COLISÕES
        // ============================================================
        function colisaoRetangulo(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x &&
                a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function verificarColisoes() {
            const pb = {
                x: perola.x + 8,
                y: perola.y + 8,
                w: perola.w - 16,
                h: perola.h - 16
            };

            for (let i = estrelas.length - 1; i >= 0; i--) {
                const e = estrelas[i];
                if (e.coletada) continue;
                const dx = (perola.x + perola.w / 2) - e.x;
                const dy = (perola.y + perola.h / 2) - e.y;
                if (Math.sqrt(dx * dx + dy * dy) < e.raio * e.tam + 16) {
                    e.coletada = true;
                    adicionarParticulas(e.x, e.y, '#FFD700', e.dourada ? 18 : 10);
                    pontos += e.dourada ? 5 : 1;
                    document.getElementById('pts').textContent = pontos;
                    estrelas.splice(i, 1);
                }
            }

            for (let i = obstaculos.length - 1; i >= 0; i--) {
                const o = obstaculos[i];
                const ob = { x: o.x, y: o.y, w: o.w, h: o.h };
                if (colisaoRetangulo(pb, ob)) {
                    perderVida();
                    adicionarParticulas(o.x + o.w / 2, o.y + o.h / 2, '#FF4757', 12);
                    obstaculos.splice(i, 1);
                    return;
                }
            }
        }

        // ============================================================
        // VIDA
        // ============================================================
        function perderVida() {
            vidas--;
            document.getElementById('vidas').textContent = vidas;
            adicionarParticulas(perola.x + perola.w / 2, perola.y + perola.h / 2, '#FF6B6B', 12);

            if (vidas <= 0) {
                gameOver();
            } else {
                perola.reset();
                perola.y = H - 130;
                let c = 0;
                const i = setInterval(() => {
                    perola.visivel = !perola.visivel;
                    c++;
                    if (c > 6) { clearInterval(i);
                        perola.visivel = true; }
                }, 150);
            }
        }

        // ============================================================
        // GAME OVER
        // ============================================================
        function gameOver() {
            rodando = false;
            document.getElementById('final').textContent = pontos;
            document.getElementById('gameover').classList.add('show');
            if (animId) cancelAnimationFrame(animId);
        }

        function reiniciar() {
            document.getElementById('gameover').classList.remove('show');
            iniciarJogo();
        }

        // ============================================================
        // INICIAR
        // ============================================================
        function iniciarJogo() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('gameover').classList.remove('show');

            pontos = 0;
            vidas = 3;
            frame = 0;
            estrelas = [];
            obstaculos = [];
            particulas = [];
            timerEstrelas = 0;
            timerObstaculos = 0;

            document.getElementById('pts').textContent = '0';
            document.getElementById('vidas').textContent = '3';

            perola.reset();
            perola.y = H - 130;
            perola.visivel = true;

            rodando = true;
            if (animId) cancelAnimationFrame(animId);
            loop();
        }

        // ============================================================
        // LOOP
        // ============================================================
        function loop() {
            if (!rodando) { animId = requestAnimationFrame(loop); return; }

            frame++;
            atualizar();
            desenhar();
            animId = requestAnimationFrame(loop);
        }

        function atualizar() {
            // Física
            perola.vy += perola.gravidade;
            perola.y += perola.vy;

            const chao = H - 120;
            if (perola.y + perola.h > chao) {
                perola.y = chao - perola.h;
                perola.vy = 0;
                perola.noChao = true;
            } else {
                perola.noChao = false;
            }

            if (perola.x < 0) perola.x = 0;
            if (perola.x + perola.w > W) perola.x = W - perola.w;

            // Atualiza o estado da Pérola baseado na velocidade
            perola.atualizarEstado();

            // Spawns
            timerEstrelas++;
            if (timerEstrelas > 35 - Math.min(pontos / 10, 12)) {
                timerEstrelas = 0;
                if (Math.random() > 0.3) estrelas.push(criarEstrela());
            }

            timerObstaculos++;
            if (timerObstaculos > 70 - Math.min(pontos / 5, 25)) {
                timerObstaculos = 0;
                if (Math.random() > 0.4) obstaculos.push(criarObstaculo());
            }

            // Atualizar objetos
            for (let i = estrelas.length - 1; i >= 0; i--) {
                const e = estrelas[i];
                e.x -= e.vel;
                e.rot += 0.04;
                if (e.x < -30) estrelas.splice(i, 1);
            }

            for (let i = obstaculos.length - 1; i >= 0; i--) {
                const o = obstaculos[i];
                o.x -= o.vel;
                o.rot += 0.02;
                o.off += 0.04;
                if (o.x < -30) obstaculos.splice(i, 1);
            }

            for (let i = particulas.length - 1; i >= 0; i--) {
                const p = particulas[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.life -= p.decay;
                p.raio *= 0.99;
                if (p.life <= 0 || p.raio < 0.3) particulas.splice(i, 1);
            }

            verificarColisoes();
        }

        function desenhar() {
            ctx.clearRect(0, 0, W, H);

            // Céu
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, '#87CEEB');
            g.addColorStop(0.4, '#4A90D9');
            g.addColorStop(0.7, '#2C5F8A');
            g.addColorStop(1, '#1A3A5A');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);

            // Sol
            ctx.shadowColor = 'rgba(255,200,50,0.15)';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(W - 50, 50, 25, 0, Math.PI * 2);
            const gs = ctx.createRadialGradient(W - 50, 50, 0, W - 50, 50, 25);
            gs.addColorStop(0, '#FFE066');
            gs.addColorStop(0.6, '#FFD700');
            gs.addColorStop(1, '#FFA500');
            ctx.fillStyle = gs;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Chão
            const chao = H - 120;
            const gc = ctx.createLinearGradient(0, chao, 0, H);
            gc.addColorStop(0, '#F4A460');
            gc.addColorStop(0.2, '#D2691E');
            gc.addColorStop(0.5, '#8B4513');
            gc.addColorStop(1, '#2C1810');
            ctx.fillStyle = gc;
            ctx.fillRect(0, chao, W, H - chao);

            // Grama
            ctx.strokeStyle = 'rgba(34,139,34,0.2)';
            ctx.lineWidth = 2;
            for (let i = 0; i < W; i += 10) {
                const h = 3 + Math.sin(i * 0.3 + frame * 0.02) * 2;
                ctx.beginPath();
                ctx.moveTo(i, chao);
                ctx.lineTo(i + 2, chao - h);
                ctx.stroke();
            }

            desenharNuvens();
            desenharBolhas();

            estrelas.forEach(e => desenharEstrela(e));
            obstaculos.forEach(o => desenharObstaculo(o));
            perola.desenhar();

            particulas.forEach(p => {
                ctx.globalAlpha = p.life * 0.8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.raio, 0, Math.PI * 2);
                ctx.fillStyle = p.cor;
                ctx.shadowColor = p.cor;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });
        }

        // ============================================================
        // DECORAÇÕES
        // ============================================================
        let nuvens = [];
        for (let i = 0; i < 4; i++) {
            nuvens.push({
                x: Math.random() * W,
                y: 15 + Math.random() * 50,
                w: 50 + Math.random() * 70,
                vel: 0.1 + Math.random() * 0.12,
                op: 0.2 + Math.random() * 0.2
            });
        }

        function desenharNuvens() {
            nuvens.forEach(n => {
                n.x += n.vel;
                if (n.x > W + n.w) n.x = -n.w;
                ctx.globalAlpha = n.op;
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(255,255,255,0.05)';
                ctx.beginPath();
                ctx.ellipse(n.x, n.y, n.w / 2.5, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(n.x - n.w / 4, n.y + 4, n.w / 3.5, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(n.x + n.w / 4, n.y + 4, n.w / 3.5, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });
        }

        let bolhas = [];
        for (let i = 0; i < 12; i++) {
            bolhas.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: 2 + Math.random() * 3,
                vel: 0.1 + Math.random() * 0.12,
                off: Math.random() * Math.PI * 2
            });
        }

        function desenharBolhas() {
            bolhas.forEach(b => {
                b.y -= b.vel;
                b.x += Math.sin(frame * 0.02 + b.off) * 0.08;
                if (b.y < -10) { b.y = H + 10;
                    b.x = Math.random() * W; }
                ctx.globalAlpha = 0.1;
                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            });
        }

        // ============================================================
        // CONTROLES - MOBILE
        // ============================================================
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            toqueX = t.clientX - rect.left;

            if (perola.noChao && rodando) {
                perola.vy = perola.pulo;
                perola.noChao = false;
                adicionarParticulas(perola.x + perola.w / 2, perola.y + perola.h, '#87CEEB', 6);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!rodando) return;
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = t.clientX - rect.left;

            if (toqueX !== null) {
                const diff = x - toqueX;
                const velocidade = diff * 0.6;
                perola.x += velocidade;
                perola.velocidadeX = velocidade;

                if (velocidade > 1) perola.direcao = 'direita';
                else if (velocidade < -1) perola.direcao = 'esquerda';

                if (perola.x < 0) perola.x = 0;
                if (perola.x + perola.w > W) perola.x = W - perola.w;
                toqueX = x;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            toqueX = null;
            perola.velocidadeX = 0;
        }, { passive: false });

        // ============================================================
        // CONTROLES - TECLADO
        // ============================================================
        const teclas = {};

        window.addEventListener('keydown', (e) => {
            teclas[e.key] = true;

            if ((e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') &&
                perola.noChao && rodando) {
                e.preventDefault();
                perola.vy = perola.pulo;
                perola.noChao = false;
            }
        });

        window.addEventListener('keyup', (e) => { teclas[e.key] = false; });

        // Movimento contínuo desktop
        setInterval(() => {
            if (!rodando) return;

            let dx = 0;
            if (teclas['ArrowRight'] || teclas['d']) dx = 4;
            else if (teclas['ArrowLeft'] || teclas['a']) dx = -4;

            if (dx !== 0) {
                perola.x += dx;
                perola.velocidadeX = dx;
                perola.direcao = dx > 0 ? 'direita' : 'esquerda';
                if (perola.x < 0) perola.x = 0;
                if (perola.x + perola.w > W) perola.x = W - perola.w;
            } else {
                perola.velocidadeX = 0;
            }
        }, 16);

        // ============================================================
        // REDIMENSIONAR
        // ============================================================
        window.addEventListener('resize', () => {
            redimensionar();
            if (perola.y + perola.h > H - 120) {
                perola.y = H - 120 - perola.h;
            }
        });

        // ============================================================
        // INICIAR
        // ============================================================
        perola.y = H - 130;
        perola.reset();

        function telaInicialLoop() {
            if (!rodando && document.getElementById('start').style.display !== 'none') {
                ctx.clearRect(0, 0, W, H);
                const g = ctx.createLinearGradient(0, 0, 0, H);
                g.addColorStop(0, '#87CEEB');
                g.addColorStop(0.5, '#4A90D9');
                g.addColorStop(1, '#2C5F8A');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, W, H);
                perola.desenhar();
                desenharNuvens();
                desenharBolhas();
                requestAnimationFrame(telaInicialLoop);
            }
        }
        telaInicialLoop();

        console.log('🌊 Jogo com imagens personalizadas!');
        console.log('📁 Imagens esperadas:');
        console.log('   - pulando.png');
        console.log('   - andando.png');
        console.log('   - correndoesquerda.png');
        console.log('   - passolargo.png');
        console.log('   - escalando.png');
        console.log('   - correndodireita.png');
        console.log('📱 Coloque as imagens na mesma pasta do index.html');
    </script>
</body>
</html>

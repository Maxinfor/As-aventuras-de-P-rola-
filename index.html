<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌊 As Aventuras de Pérola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #4A90D9 50%, #2C5F8A 100%);
            touch-action: none;
            cursor: pointer;
        }
        
        #start {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        #start .logo { font-size: 5rem; animation: float 2s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        
        #start h1 {
            font-size: 3rem;
            color: #FFD700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            margin: 10px 0;
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        
        #start .sub {
            font-size: 1.2rem;
            color: #87CEEB;
            margin-bottom: 25px;
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        
        #start button {
            padding: 18px 55px;
            font-size: 1.6rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #FF6B6B, #FF4757);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 8px 0;
            transition: all 0.3s ease;
            box-shadow: 0 8px 40px rgba(255, 71, 87, 0.4);
            min-height: 65px;
            min-width: 220px;
            touch-action: manipulation;
        }
        
        #start button:hover { transform: scale(1.05); }
        #start button:active { transform: scale(0.95); }
        
        .controls-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-top: 20px;
            text-align: center;
            line-height: 2.2;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 25px;
            border-radius: 20px;
            max-width: 350px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .controls-info .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 12px;
            border-radius: 8px;
            font-weight: bold;
            color: #fff;
            margin: 0 3px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .controls-info .highlight {
            color: #FFD700;
        }
        
        #info {
            position: fixed;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 1.6rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 18px;
            border-radius: 30px;
            z-index: 50;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        #info .heart {
            color: #FF4757;
            font-size: 1.8rem;
            animation: heartbeat 1.2s ease-in-out infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        #score {
            position: fixed;
            top: 15px;
            right: 15px;
            color: white;
            font-size: 1.6rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 18px;
            border-radius: 30px;
            z-index: 50;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        #score .star-icon {
            color: #FFD700;
            font-size: 2.2rem;
            animation: spinStar 4s linear infinite;
        }
        
        @keyframes spinStar {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        #gameover {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 0, 0, 0.92);
            padding: 35px 30px;
            border-radius: 35px;
            text-align: center;
            border: 4px solid #FFD700;
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            width: 85%;
            max-width: 380px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.15);
        }
        
        #gameover.show { transform: translate(-50%, -50%) scale(1); }
        #gameover .emoji { font-size: 4rem; display: block; animation: float 2s ease-in-out infinite; }
        #gameover h1 { color: #FFD700; font-size: 2.5rem; margin: 10px 0; font-family: 'Comic Sans MS', cursive, sans-serif; }
        #gameover .fscore { color: #87CEEB; font-size: 1.4rem; margin: 15px 0; font-family: 'Comic Sans MS', cursive, sans-serif; }
        #gameover .fscore span { color: #FFD700; font-size: 2.5rem; }
        #gameover button {
            padding: 15px 40px;
            font-size: 1.3rem;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            transition: all 0.3s ease;
            min-height: 55px;
            min-width: 160px;
            touch-action: manipulation;
            box-shadow: 0 8px 40px rgba(255, 215, 0, 0.3);
        }
        #gameover button:hover { transform: scale(1.05); }
        #gameover button:active { transform: scale(0.95); }
        
        @media (max-width: 400px) {
            #start h1 { font-size: 2.2rem; }
            #start .logo { font-size: 3.5rem; }
            #start button { font-size: 1.2rem; padding: 14px 30px; min-height: 50px; min-width: 160px; }
            #info, #score { font-size: 1.1rem; padding: 5px 12px; top: 10px; }
            #info .heart { font-size: 1.3rem; }
            #score .star-icon { font-size: 1.5rem; }
            #gameover { padding: 25px 20px; width: 92%; }
            #gameover h1 { font-size: 1.8rem; }
            #gameover .fscore { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="start">
        <div class="logo">🌊</div>
        <h1>As Aventuras de Pérola</h1>
        <div class="sub">🐚 Com imagens personalizadas!</div>
        <button onclick="iniciarJogo()">🎮 Começar</button>
        <div class="controls-info">
            📱 <span class="key">Toque</span> para pular • <span class="key">Arraste</span> para mover<br>
            ⬅️ ➡️ <span class="key">Setas</span> para mover • <span class="key">Espaço</span> para pular<br>
            ⭐ Estrelas <span class="highlight">douradas</span> valem +5 pontos!
        </div>
    </div>

    <!-- UI -->
    <div id="info"><span class="heart">❤️</span> <span id="vidas">3</span></div>
    <div id="score"><span class="star-icon">⭐</span> <span id="pts">0</span></div>

    <!-- GAME OVER -->
    <div id="gameover">
        <span class="emoji">💫</span>
        <h1>Fim de Jogo!</h1>
        <div class="fscore">⭐ Estrelas: <span id="final">0</span></div>
        <button onclick="reiniciar()">🔄 Jogar Novamente</button>
    </div>

    <!-- CANVAS -->
    <canvas id="canvas"></canvas>

    <script>
        // ============================================================
        // CANVAS
        // ============================================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function redimensionar() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        redimensionar();
        window.addEventListener('resize', redimensionar);

        // ============================================================
        // CARREGAR IMAGENS DA PÉROLA
        // ============================================================
        const PASTA_IMAGENS = './';
        
        const imagens = {
            pulando: new Image(),
            andando: new Image(),
            correndoesquerda: new Image(),
            passolargo: new Image(),
            escalando1: new Image(),
            correndodireita: new Image(),
            acelerando: new Image()
        };

        // 🔥 AUMENTEI O TAMANHO DA PÉROLA AQUI!
        const TAMANHO_PEROLA = {
            largura: 90,   // ANTES: 50 → AGORA: 90 (80% maior)
            altura: 110    // ANTES: 60 → AGORA: 110 (83% maior)
        };

        const CONFIG_IMAGENS = {
            pulando: {
                src: PASTA_IMAGENS + 'pulando.png',
                largura: TAMANHO_PEROLA.largura,
                altura: TAMANHO_PEROLA.altura,
                descricao: 'Pulando'
            },
            andando: {
                src: PASTA_IMAGENS + 'andando.png',
                largura: TAMANHO_PEROLA.largura,
                altura: TAMANHO_PEROLA.altura,
                descricao: 'Andando'
            },
            correndoesquerda: {
                src: PASTA_IMAGENS + 'correndoesquerda.png',
                largura: TAMANHO_PEROLA.largura,
                altura: TAMANHO_PEROLA.altura,
                descricao: 'Correndo para esquerda'
            },
            passolargo: {
                src: PASTA_IMAGENS + 'passolargo.png',
                largura: TAMANHO_PEROLA.largura,
                altura: TAMANHO_PEROLA.altura,
                descricao: 'Passo largo'
            },
            escalando1: {
                src: PASTA_IMAGENS + 'escalando1.png',
                largura: TAMANHO_PEROLA.largura,
                altura: TAMANHO_PEROLA.altura,
                descricao: 'Escalando'
            },
            correndodireita: {
                src: PASTA_IMAGENS + 'correndodireita.png',
                largura: TAMANHO_PEROLA.largura,
                altura: TAMANHO_PEROLA.altura,
                descricao: 'Correndo para direita'
            },
            acelerando: {
                src: PASTA_IMAGENS + 'acelerando.png',
                largura: TAMANHO_PEROLA.largura,
                altura: TAMANHO_PEROLA.altura,
                descricao: 'Acelerando'
            }
        };

        let imagensCarregadas = 0;
        const totalImagens = Object.keys(imagens).length;

        for (const [nome, img] of Object.entries(imagens)) {
            const config = CONFIG_IMAGENS[nome];
            img.src = config.src;
            img.onload = () => {
                imagensCarregadas++;
                console.log(`✅ Imagem "${nome}" carregada! (${config.descricao})`);
                if (imagensCarregadas >= totalImagens) {
                    console.log('🎉 Todas as imagens carregadas!');
                    console.log('📏 Tamanho da Pérola:', TAMANHO_PEROLA.largura + 'x' + TAMANHO_PEROLA.altura);
                }
            };
            img.onerror = () => {
                console.warn(`⚠️ Erro ao carregar "${nome}" - usando fallback`);
                imagensCarregadas++;
                criarFallback(nome);
            };
        }

        function criarFallback(nome) {
            const canvasTemp = document.createElement('canvas');
            canvasTemp.width = TAMANHO_PEROLA.largura * 2;
            canvasTemp.height = TAMANHO_PEROLA.altura * 2;
            const ctxTemp = canvasTemp.getContext('2d');
            
            const w = TAMANHO_PEROLA.largura * 2;
            const h = TAMANHO_PEROLA.altura * 2;
            
            ctxTemp.fillStyle = '#FF6B6B';
            ctxTemp.beginPath();
            ctxTemp.arc(w/2, h/2 - 10, 50, 0, Math.PI * 2);
            ctxTemp.fill();
            
            ctxTemp.fillStyle = '#FFD5C2';
            ctxTemp.beginPath();
            ctxTemp.arc(w/2, h/2 - 20, 35, 0, Math.PI * 2);
            ctxTemp.fill();
            
            ctxTemp.fillStyle = '#2C3E50';
            ctxTemp.beginPath();
            ctxTemp.arc(w/2 - 12, h/2 - 22, 5, 0, Math.PI * 2);
            ctxTemp.fill();
            ctxTemp.beginPath();
            ctxTemp.arc(w/2 + 12, h/2 - 22, 5, 0, Math.PI * 2);
            ctxTemp.fill();
            
            ctxTemp.fillStyle = '#FFD700';
            ctxTemp.beginPath();
            ctxTemp.arc(w/2, h/2 + 30, 35, 0, Math.PI);
            ctxTemp.fill();
            
            const imgFallback = new Image();
            imgFallback.src = canvasTemp.toDataURL();
            imagens[nome] = imgFallback;
        }

        // ============================================================
        // JOGO
        // ============================================================
        let rodando = false;
        let pontos = 0;
        let vidas = 3;
        let frame = 0;
        let estrelas = [];
        let obstaculos = [];
        let particulas = [];
        let animId = null;
        let timerEstrelas = 0;
        let timerObstaculos = 0;
        let toqueX = null;
        let comboCount = 0;
        let ultimoPonto = 0;

        // ============================================================
        // PÉROLA - TAMANHO AUMENTADO
        // ============================================================
        const perola = {
            x: 80,
            y: 0,
            w: TAMANHO_PEROLA.largura,
            h: TAMANHO_PEROLA.altura,
            vy: 0,
            gravidade: 0.6,
            pulo: -13,
            noChao: false,
            visivel: true,
            direcao: 'direita',
            estado: 'parada',
            velocidadeX: 0,
            timerAnimacao: 0,
            acelerando: false,
            sombraY: 0,

            reset() {
                this.x = 80;
                this.y = H - 180;
                this.vy = 0;
                this.noChao = false;
                this.visivel = true;
                this.direcao = 'direita';
                this.estado = 'parada';
                this.velocidadeX = 0;
                this.acelerando = false;
            },

            desenhar() {
                if (!this.visivel) return;

                // Sombra no chão
                ctx.shadowColor = 'rgba(0,0,0,0.15)';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetY = 8;

                let img = this.selecionarImagem();

                if (!img || !img.complete || img.naturalWidth === 0) {
                    this.desenharFallback();
                    return;
                }

                ctx.save();

                if (this.direcao === 'esquerda' && 
                    (this.estado === 'andando' || this.estado === 'parada' || this.estado === 'pulando')) {
                    ctx.translate(this.x + this.w, this.y);
                    ctx.scale(-1, 1);
                    ctx.drawImage(img, 0, 0, this.w, this.h);
                } else {
                    ctx.drawImage(img, this.x, this.y, this.w, this.h);
                }

                ctx.restore();
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                this.timerAnimacao++;
                if (this.timerAnimacao > 8) {
                    this.timerAnimacao = 0;
                }
            },

            selecionarImagem() {
                if (this.estado === 'pulando') return imagens.pulando;
                if (this.estado === 'escalando') return imagens.escalando1;
                if (this.acelerando) return imagens.acelerando;
                
                if (this.estado === 'correndo') {
                    return this.direcao === 'direita' ? imagens.correndodireita : imagens.correndoesquerda;
                }

                if (this.estado === 'andando') {
                    return Math.floor(this.timerAnimacao / 6) % 2 === 0 ? imagens.andando : imagens.passolargo;
                }

                return imagens.andando;
            },

            desenharFallback() {
                ctx.save();
                
                const cx = this.x + this.w/2;
                const cy = this.y + this.h/2;
                const escala = this.w / 50;

                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetY = 5;

                // Vestido
                const grad = ctx.createRadialGradient(
                    this.x + 15*escala, this.y + 20*escala, 5*escala,
                    this.x + 25*escala, this.y + 50*escala, 45*escala
                );
                grad.addColorStop(0, '#FF8A8A');
                grad.addColorStop(1, '#E74C6F');

                ctx.beginPath();
                ctx.ellipse(cx, this.y + this.h * 0.58,
                    this.w * 0.35, this.h * 0.42, 0, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = '#CC4466';
                ctx.lineWidth = 2*escala;
                ctx.stroke();

                // Cabeça
                ctx.shadowBlur = 8;
                const raio = 22*escala;
                const cabecaY = this.y + 25*escala;

                ctx.beginPath();
                ctx.arc(cx, cabecaY, raio, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD5C2';
                ctx.fill();
                ctx.strokeStyle = '#E8B89A';
                ctx.lineWidth = 2*escala;
                ctx.stroke();

                // Cabelo
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.arc(cx - 8*escala, cabecaY - 14*escala, 12*escala, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 8*escala, cabecaY - 14*escala, 12*escala, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx, cabecaY - 18*escala, 15*escala, 0, Math.PI * 2);
                ctx.fill();

                // Olhos
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.ellipse(cx - 7*escala, cabecaY + 1*escala, 5*escala, 6*escala, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + 7*escala, cabecaY + 1*escala, 5*escala, 6*escala, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.arc(cx - 5*escala, cabecaY + 2*escala, 3*escala, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 9*escala, cabecaY + 2*escala, 3*escala, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(cx - 6*escala, cabecaY - 1*escala, 1.5*escala, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 8*escala, cabecaY - 1*escala, 1.5*escala, 0, Math.PI * 2);
                ctx.fill();

                // Boca
                ctx.beginPath();
                ctx.arc(cx, cabecaY + 8*escala, 8*escala, 0.1, Math.PI - 0.1);
                ctx.strokeStyle = '#CC4466';
                ctx.lineWidth = 2*escala;
                ctx.stroke();

                // Bochechas
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(cx - 14*escala, cabecaY + 5*escala, 5*escala, 3.5*escala, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + 14*escala, cabecaY + 5*escala, 5*escala, 3.5*escala, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                ctx.restore();
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
            },

            atualizarEstado() {
                const velocidade = Math.abs(this.velocidadeX);

                if (!this.noChao) {
                    this.estado = 'pulando';
                    this.acelerando = false;
                    return;
                }

                if (velocidade > 5) {
                    this.estado = 'correndo';
                    this.acelerando = true;
                    return;
                }

                if (velocidade > 3) {
                    this.estado = 'correndo';
                    this.acelerando = false;
                    return;
                }

                if (velocidade > 0.5) {
                    this.estado = 'andando';
                    this.acelerando = false;
                    return;
                }

                this.estado = 'parada';
                this.acelerando = false;
            }
        };

        // ============================================================
        // ESTRELAS (AUMENTADAS)
        // ============================================================
        function criarEstrela() {
            return {
                x: W + 30,
                y: 60 + Math.random() * (H - 200),
                raio: 15 + Math.random() * 10,
                vel: 1.5 + Math.random() * 2,
                rot: Math.random() * Math.PI * 2,
                coletada: false,
                dourada: Math.random() > 0.75,
                tam: Math.random() > 0.75 ? 1.4 : 1
            };
        }

        function desenharEstrela(e) {
            if (e.coletada) return;
            ctx.save();
            ctx.translate(e.x, e.y);
            ctx.rotate(e.rot);
            ctx.scale(e.tam, e.tam);

            // Brilho
            const gradBrilho = ctx.createRadialGradient(0, 0, 0, 0, 0, e.raio * 2);
            gradBrilho.addColorStop(0, 'rgba(255,215,0,0.15)');
            gradBrilho.addColorStop(1, 'rgba(255,215,0,0)');
            ctx.fillStyle = gradBrilho;
            ctx.beginPath();
            ctx.arc(0, 0, e.raio * 2, 0, Math.PI * 2);
            ctx.fill();

            const pts = 5;
            const outer = e.raio;
            const inner = e.raio * 0.4;

            ctx.beginPath();
            for (let i = 0; i < pts * 2; i++) {
                const r = i % 2 === 0 ? outer : inner;
                const a = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
                if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }
            ctx.closePath();

            const grad = ctx.createRadialGradient(-3, -3, 0, 0, 0, e.raio);
            grad.addColorStop(0, '#FFE066');
            grad.addColorStop(0.5, '#FFD700');
            grad.addColorStop(1, '#FFA500');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#FF8C00';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Brilho extra
            ctx.shadowColor = 'rgba(255,215,0,0.3)';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;

            if (e.dourada) {
                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.arc(-3.5, -2, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(3.5, -2, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(0, 1.5, 3.5, 0.1, Math.PI - 0.1);
                ctx.strokeStyle = '#2C3E50';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            ctx.restore();
        }

        // ============================================================
        // OBSTÁCULOS
        // ============================================================
        function criarObstaculo() {
            return {
                x: W + 30,
                y: H - 180 - Math.random() * 80,
                w: 30 + Math.random() * 25,
                h: 30 + Math.random() * 25,
                vel: 2 + Math.random() * 2,
                tipo: Math.random() > 0.5 ? 'espinho' : 'agua',
                rot: 0,
                off: Math.random() * Math.PI * 2
            };
        }

        function desenharObstaculo(o) {
            ctx.save();
            ctx.translate(o.x + o.w/2, o.y + o.h/2);
            ctx.rotate(o.rot);

            if (o.tipo === 'espinho') {
                const pts = 5;
                const outer = o.w/2;
                const inner = outer * 0.35;

                ctx.beginPath();
                for (let i = 0; i < pts * 2; i++) {
                    const r = i % 2 === 0 ? outer : inner;
                    const a = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
                    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                }
                ctx.closePath();

                const grad = ctx.createRadialGradient(-3, -3, 0, 0, 0, outer);
                grad.addColorStop(0, '#FF6B8A');
                grad.addColorStop(0.5, '#FF4757');
                grad.addColorStop(1, '#C0392B');
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = '#A93226';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(-5, -3.5, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(5, -3.5, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.arc(-4.5, -2.5, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(5.5, -2.5, 2.5, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = 'rgba(200,230,255,0.3)';
                ctx.beginPath();
                ctx.arc(0, 0, o.w/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(150,200,255,0.25)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2 + o.off;
                    const len = 10 + Math.sin(frame * 0.04 + i * 1.2) * 5;
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(a) * o.w/2 * 0.4, Math.sin(a) * o.w/2 * 0.4);
                    ctx.quadraticCurveTo(
                        Math.cos(a) * (o.w/2 + len * 0.3),
                        Math.sin(a) * (o.w/2 + len * 0.3) + 5,
                        Math.cos(a) * (o.w/2 + len),
                        Math.sin(a) * (o.w/2 + len) + 10
                    );
                    ctx.strokeStyle = `rgba(150,200,255,${0.15 + Math.sin(frame * 0.03 + i) * 0.1})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.arc(-3, -2, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(3, -2, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        // ============================================================
        // PARTÍCULAS (EFEITOS)
        // ============================================================
        function adicionarParticulas(x, y, cor, qtd = 15, tamanho = 4) {
            for (let i = 0; i < qtd; i++) {
                const a = Math.random() * Math.PI * 2;
                const s = 1 + Math.random() * 4;
                particulas.push({
                    x, y,
                    vx: Math.cos(a) * s,
                    vy: Math.sin(a) * s - 1,
                    life: 1,
                    decay: 0.008 + Math.random() * 0.02,
                    raio: 1.5 + Math.random() * tamanho,
                    cor: cor || '#FFD700'
                });
            }
        }

        // ============================================================
        // COLISÕES
        // ============================================================
        function colisaoRetangulo(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x &&
                   a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function verificarColisoes() {
            const pb = {
                x: perola.x + 12,
                y: perola.y + 12,
                w: perola.w - 24,
                h: perola.h - 24
            };

            for (let i = estrelas.length - 1; i >= 0; i--) {
                const e = estrelas[i];
                if (e.coletada) continue;
                const dx = (perola.x + perola.w/2) - e.x;
                const dy = (perola.y + perola.h/2) - e.y;
                if (Math.sqrt(dx*dx + dy*dy) < e.raio * e.tam + 25) {
                    e.coletada = true;
                    const qtd = e.dourada ? 30 : 20;
                    adicionarParticulas(e.x, e.y, '#FFD700', qtd, 5);
                    pontos += e.dourada ? 5 : 1;
                    document.getElementById('pts').textContent = pontos;
                    estrelas.splice(i, 1);
                    
                    // Efeito de combo
                    if (e.dourada) {
                        comboCount++;
                        if (comboCount > 3) {
                            adicionarParticulas(e.x, e.y - 20, '#FF6B6B', 15, 3);
                        }
                    }
                }
            }

            for (let i = obstaculos.length - 1; i >= 0; i--) {
                const o = obstaculos[i];
                const ob = { x: o.x, y: o.y, w: o.w, h: o.h };
                if (colisaoRetangulo(pb, ob)) {
                    perderVida();
                    adicionarParticulas(o.x + o.w/2, o.y + o.h/2, '#FF4757', 20, 5);
                    obstaculos.splice(i, 1);
                    comboCount = 0;
                    return;
                }
            }
        }

        // ============================================================
        // VIDA
        // ============================================================
        function perderVida() {
            vidas--;
            document.getElementById('vidas').textContent = vidas;
            adicionarParticulas(perola.x + perola.w/2, perola.y + perola.h/2, '#FF6B6B', 25, 5);

            if (vidas <= 0) {
                gameOver();
            } else {
                perola.reset();
                perola.y = H - 180;
                let c = 0;
                const i = setInterval(() => {
                    perola.visivel = !perola.visivel;
                    c++;
                    if (c > 8) { clearInterval(i); perola.visivel = true; }
                }, 150);
            }
        }

        // ============================================================
        // GAME OVER
        // ============================================================
        function gameOver() {
            rodando = false;
            document.getElementById('final').textContent = pontos;
            document.getElementById('gameover').classList.add('show');
            if (animId) cancelAnimationFrame(animId);
        }

        function reiniciar() {
            document.getElementById('gameover').classList.remove('show');
            comboCount = 0;
            iniciarJogo();
        }

        // ============================================================
        // INICIAR
        // ============================================================
        function iniciarJogo() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('gameover').classList.remove('show');

            pontos = 0;
            vidas = 3;
            frame = 0;
            estrelas = [];
            obstaculos = [];
            particulas = [];
            timerEstrelas = 0;
            timerObstaculos = 0;
            comboCount = 0;

            document.getElementById('pts').textContent = '0';
            document.getElementById('vidas').textContent = '3';

            perola.reset();
            perola.y = H - 180;
            perola.visivel = true;

            rodando = true;
            if (animId) cancelAnimationFrame(animId);
            loop();
        }

        // ============================================================
        // LOOP
        // ============================================================
        function loop() {
            if (!rodando) { animId = requestAnimationFrame(loop); return; }

            frame++;
            atualizar();
            desenhar();
            animId = requestAnimationFrame(loop);
        }

        function atualizar() {
            perola.vy += perola.gravidade;
            perola.y += perola.vy;

            const chao = H - 170;
            if (perola.y + perola.h > chao) {
                perola.y = chao - perola.h;
                perola.vy = 0;
                perola.noChao = true;
            } else {
                perola.noChao = false;
            }

            if (perola.x < 0) perola.x = 0;
            if (perola.x + perola.w > W) perola.x = W - perola.w;

            perola.atualizarEstado();

            timerEstrelas++;
            if (timerEstrelas > 30 - Math.min(pontos / 8, 10)) {
                timerEstrelas = 0;
                if (Math.random() > 0.3) estrelas.push(criarEstrela());
            }

            timerObstaculos++;
            if (timerObstaculos > 60 - Math.min(pontos / 4, 20)) {
                timerObstaculos = 0;
                if (Math.random() > 0.4) obstaculos.push(criarObstaculo());
            }

            for (let i = estrelas.length - 1; i >= 0; i--) {
                const e = estrelas[i];
                e.x -= e.vel;
                e.rot += 0.04;
                if (e.x < -40) estrelas.splice(i, 1);
            }

            for (let i = obstaculos.length - 1; i >= 0; i--) {
                const o = obstaculos[i];
                o.x -= o.vel;
                o.rot += 0.02;
                o.off += 0.04;
                if (o.x < -40) obstaculos.splice(i, 1);
            }

            for (let i = particulas.length - 1; i >= 0; i--) {
                const p = particulas[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.life -= p.decay;
                p.raio *= 0.99;
                if (p.life <= 0 || p.raio < 0.3) particulas.splice(i, 1);
            }

            verificarColisoes();
        }

        function desenhar() {
            ctx.clearRect(0, 0, W, H);

            // Céu
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, '#87CEEB');
            g.addColorStop(0.3, '#4A90D9');
            g.addColorStop(0.6, '#2C5F8A');
            g.addColorStop(1, '#1A3A5A');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);

            // Sol
            ctx.shadowColor = 'rgba(255,200,50,0.2)';
            ctx.shadowBlur = 40;
            ctx.beginPath();
            ctx.arc(W - 60, 60, 35, 0, Math.PI * 2);
            const gs = ctx.createRadialGradient(W - 60, 60, 0, W - 60, 60, 35);
            gs.addColorStop(0, '#FFE066');
            gs.addColorStop(0.5, '#FFD700');
            gs.addColorStop(1, '#FFA500');
            ctx.fillStyle = gs;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Chão
            const chao = H - 170;
            const gc = ctx.createLinearGradient(0, chao, 0, H);
            gc.addColorStop(0, '#F4A460');
            gc.addColorStop(0.15, '#D2691E');
            gc.addColorStop(0.4, '#8B4513');
            gc.addColorStop(1, '#2C1810');
            ctx.fillStyle = gc;
            ctx.fillRect(0, chao, W, H - chao);

            // Grama
            ctx.strokeStyle = 'rgba(34,139,34,0.25)';
            ctx.lineWidth = 2;
            for (let i = 0; i < W; i += 10) {
                const h = 4 + Math.sin(i * 0.3 + frame * 0.02) * 2.5;
                ctx.beginPath();
                ctx.moveTo(i, chao);
                ctx.lineTo(i + 2, chao - h);
                ctx.stroke();
            }

            desenharNuvens();
            desenharBolhas();

            estrelas.forEach(e => desenharEstrela(e));
            obstaculos.forEach(o => desenharObstaculo(o));
            perola.desenhar();

            particulas.forEach(p => {
                ctx.globalAlpha = p.life * 0.8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.raio, 0, Math.PI * 2);
                ctx.fillStyle = p.cor;
                ctx.shadowColor = p.cor;
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });
        }

        // ============================================================
        // DECORAÇÕES
        // ============================================================
        let nuvens = [];
        for (let i = 0; i < 5; i++) {
            nuvens.push({
                x: Math.random() * W,
                y: 15 + Math.random() * 60,
                w: 60 + Math.random() * 90,
                vel: 0.1 + Math.random() * 0.15,
                op: 0.2 + Math.random() * 0.25
            });
        }

        function desenharNuvens() {
            nuvens.forEach(n => {
                n.x += n.vel;
                if (n.x > W + n.w) n.x = -n.w;
                ctx.globalAlpha = n.op;
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255,255,255,0.05)';
                ctx.beginPath();
                ctx.ellipse(n.x, n.y, n.w/2.5, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(n.x - n.w/4, n.y + 5, n.w/3.5, 14, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(n.x + n.w/4, n.y + 5, n.w/3.5, 14, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });
        }

        let bolhas = [];
        for (let i = 0; i < 15; i++) {
            bolhas.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: 2 + Math.random() * 4,
                vel: 0.1 + Math.random() * 0.15,
                off: Math.random() * Math.PI * 2
            });
        }

        function desenharBolhas() {
            bolhas.forEach(b => {
                b.y -= b.vel;
                b.x += Math.sin(frame * 0.02 + b.off) * 0.1;
                if (b.y < -10) { b.y = H + 10; b.x = Math.random() * W; }
                ctx.globalAlpha = 0.12;
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            });
        }

        // ============================================================
        // CONTROLES - MOBILE
        // ============================================================
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            toqueX = t.clientX - rect.left;

            if (perola.noChao && rodando) {
                perola.vy = perola.pulo;
                perola.noChao = false;
                adicionarParticulas(perola.x + perola.w/2, perola.y + perola.h, '#87CEEB', 8, 3);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!rodando) return;
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = t.clientX - rect.left;

            if (toqueX !== null) {
                const diff = x - toqueX;
                const velocidade = diff * 0.5;
                perola.x += velocidade;
                perola.velocidadeX = velocidade;

                if (velocidade > 0.5) perola.direcao = 'direita';
                else if (velocidade < -0.5) perola.direcao = 'esquerda';

                if (perola.x < 0) perola.x = 0;
                if (perola.x + perola.w > W) perola.x = W - perola.w;
                toqueX = x;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            toqueX = null;
            perola.velocidadeX = 0;
        }, { passive: false });

        // ============================================================
        // CONTROLES - TECLADO
        // ============================================================
        const teclas = {};

        window.addEventListener('keydown', (e) => {
            teclas[e.key] = true;

            if ((e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') &&
                perola.noChao && rodando) {
                e.preventDefault();
                perola.vy = perola.pulo;
                perola.noChao = false;
                adicionarParticulas(perola.x + perola.w/2, perola.y + perola.h, '#87CEEB', 8, 3);
            }
        });

        window.addEventListener('keyup', (e) => { teclas[e.key] = false; });

        setInterval(() => {
            if (!rodando) return;

            let dx = 0;
            if (teclas['ArrowRight'] || teclas['d']) dx = 5;
            else if (teclas['ArrowLeft'] || teclas['a']) dx = -5;

            if (dx !== 0) {
                perola.x += dx;
                perola.velocidadeX = dx;
                perola.direcao = dx > 0 ? 'direita' : 'esquerda';
                if (perola.x < 0) perola.x = 0;
                if (perola.x + perola.w > W) perola.x = W - perola.w;
            } else {
                perola.velocidadeX = 0;
            }
        }, 16);

        // ============================================================
        // REDIMENSIONAR
        // ============================================================
        window.addEventListener('resize', () => {
            redimensionar();
            if (perola.y + perola.h > H - 170) {
                perola.y = H - 170 - perola.h;
            }
        });

        // ============================================================
        // INICIAR
        // ============================================================
        perola.y = H - 180;
        perola.reset();

        function telaInicialLoop() {
            if (!rodando && document.getElementById('start').style.display !== 'none') {
                ctx.clearRect(0, 0, W, H);
                const g = ctx.createLinearGradient(0, 0, 0, H);
                g.addColorStop(0, '#87CEEB');
                g.addColorStop(0.5, '#4A90D9');
                g.addColorStop(1, '#2C5F8A');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, W, H);
                perola.desenhar();
                desenharNuvens();
                desenharBolhas();
                requestAnimationFrame(telaInicialLoop);
            }
        }
        telaInicialLoop();

        console.log('🌊 Jogo carregado!');
        console.log('📏 Tamanho da Pérola aumentado para:', TAMANHO_PEROLA.largura + 'x' + TAMANHO_PEROLA.altura);
        console.log('📁 Imagens esperadas: pulando.png, andando.png, correndoesquerda.png, passolargo.png, escalando1.png, correndodireita.png, acelerando.png');
        console.log('🎮 Divirta-se!');
    </script>
</body>

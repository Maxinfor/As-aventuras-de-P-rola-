<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌊 As Aventuras de Pérola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #1a0a2e, #2d1b69);
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            touch-action: none;
            user-select: none;
            height: 100vh;
            width: 100vw;
        }
        
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #4A90D9 40%, #2C5F8A 70%, #1A3A5A 100%);
            cursor: pointer;
        }
        
        /* Tela Inicial - Estilo Fofo */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 30, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        #start-screen .logo {
            font-size: 7rem;
            animation: float 3s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-25px) rotate(2deg); }
        }
        
        #start-screen h1 {
            font-size: 4.5rem;
            color: #FFD700;
            text-shadow: 
                0 0 30px rgba(255, 215, 0, 0.3),
                0 4px 20px rgba(0, 0, 0, 0.3);
            margin: 10px 0;
            text-align: center;
            font-weight: 900;
            letter-spacing: 2px;
        }
        
        #start-screen .subtitle {
            font-size: 1.8rem;
            color: #87CEEB;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }
        
        #start-screen .subtitle .emoji {
            display: inline-block;
            animation: float 2s ease-in-out infinite;
        }
        
        .btn-start {
            padding: 22px 60px;
            font-size: 2rem;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #FF6B6B, #FF4757);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', cursive;
            box-shadow: 0 8px 40px rgba(255, 71, 87, 0.4);
            margin: 10px 0;
            letter-spacing: 1px;
        }
        
        .btn-start:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 50px rgba(255, 71, 87, 0.6);
        }
        
        .btn-start:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            padding: 14px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #4A90D9, #2C5F8A);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', cursive;
            box-shadow: 0 8px 30px rgba(44, 95, 138, 0.3);
            margin: 5px 0;
        }
        
        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(44, 95, 138, 0.5);
        }
        
        .controls-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-top: 20px;
            text-align: center;
            line-height: 2.2;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 400px;
        }
        
        .controls-info .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 14px;
            border-radius: 10px;
            font-weight: bold;
            color: #fff;
            margin: 0 3px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            min-width: 30px;
        }
        
        .controls-info .highlight {
            color: #FFD700;
        }
        
        /* UI do Jogo */
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        
        #lives-display {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 2rem;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.35);
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            font-family: 'Comic Sans MS', cursive;
            z-index: 60;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #lives-display .heart {
            color: #FF4757;
            font-size: 2rem;
            animation: heartbeat 1.2s ease-in-out infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        #score-display {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.35);
            padding: 10px 25px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            font-family: 'Comic Sans MS', cursive;
            z-index: 60;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        #score-display .star-icon {
            color: #FFD700;
            font-size: 2.5rem;
            animation: spinStar 3s linear infinite;
        }
        
        @keyframes spinStar {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        /* Game Over */
        #game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(10, 10, 30, 0.95);
            padding: 40px 50px;
            border-radius: 40px;
            text-align: center;
            color: white;
            backdrop-filter: blur(30px);
            border: 3px solid #FFD700;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.15);
            z-index: 100;
            pointer-events: all;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 320px;
        }
        
        #game-over.show {
            transform: translate(-50%, -50%) scale(1);
        }
        
        #game-over .emoji-big {
            font-size: 5rem;
            display: block;
            margin-bottom: 10px;
            animation: float 2s ease-in-out infinite;
        }
        
        #game-over h1 {
            font-size: 3.5rem;
            color: #FFD700;
            margin: 10px 0;
            font-family: 'Comic Sans MS', cursive;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }
        
        #game-over .final-score {
            font-size: 1.8rem;
            margin: 20px 0;
            color: #87CEEB;
        }
        
        #game-over .final-score span {
            color: #FFD700;
            font-size: 3rem;
            display: inline-block;
            animation: spinStar 2s linear infinite;
        }
        
        #game-over .btn-restart {
            padding: 18px 50px;
            font-size: 1.5rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', cursive;
            box-shadow: 0 8px 40px rgba(255, 215, 0, 0.3);
            margin-top: 10px;
        }
        
        #game-over .btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 50px rgba(255, 215, 0, 0.5);
        }
        
        /* Responsivo */
        @media (max-width: 768px) {
            #start-screen h1 { font-size: 2.8rem; }
            #start-screen .logo { font-size: 5rem; }
            #start-screen .subtitle { font-size: 1.2rem; }
            .btn-start { font-size: 1.3rem; padding: 16px 35px; }
            .btn-secondary { font-size: 1rem; padding: 10px 25px; }
            .controls-info { font-size: 0.75rem; padding: 12px 18px; max-width: 90%; }
            #lives-display { font-size: 1.3rem; padding: 6px 14px; top: 10px; left: 10px; }
            #lives-display .heart { font-size: 1.3rem; }
            #score-display { font-size: 1.3rem; padding: 6px 14px; top: 10px; right: 10px; }
            #score-display .star-icon { font-size: 1.6rem; }
            #game-over { padding: 25px 20px; min-width: auto; width: 90%; }
            #game-over .emoji-big { font-size: 3.5rem; }
            #game-over h1 { font-size: 2.5rem; }
            #game-over .final-score { font-size: 1.2rem; }
            #game-over .final-score span { font-size: 2rem; }
            #game-over .btn-restart { font-size: 1.1rem; padding: 14px 30px; }
        }
        
        @media (max-width: 400px) {
            #start-screen h1 { font-size: 2rem; }
            #start-screen .logo { font-size: 3.5rem; }
            .btn-start { font-size: 1rem; padding: 14px 25px; }
        }
    </style>
</head>
<body>
    
    <!-- TELA INICIAL -->
    <div id="start-screen">
        <div class="logo">🌊</div>
        <h1>As Aventuras de Pérola</h1>
        <div class="subtitle">
            <span class="emoji">🐚</span> Ajude a Pérola a coletar estrelas!
        </div>
        <button class="btn-start" onclick="startGame()">🎮 Começar</button>
        <button class="btn-secondary" onclick="toggleControls()">🎯 Como Jogar</button>
        <div class="controls-info" id="controls-info" style="display:none;">
            <div>⬅️ ➡️ <span class="key">Setas</span> ou <span class="key">A</span> <span class="key">D</span> para mover</div>
            <div>⬆️ <span class="key">Espaço</span> ou <span class="key">W</span> para pular</div>
            <div>📱 <span class="highlight">Toque</span> na tela para pular (mobile)</div>
            <div>⭐ Colete estrelas <span class="highlight">douradas</span> valem mais pontos!</div>
        </div>
    </div>
    
    <!-- UI DO JOGO -->
    <div id="ui-overlay">
        <div id="lives-display">
            <span class="heart">❤️</span>
            <span id="lives">3</span>
        </div>
        <div id="score-display">
            <span class="star-icon">⭐</span>
            <span id="score">0</span>
        </div>
    </div>
    
    <!-- GAME OVER -->
    <div id="game-over">
        <span class="emoji-big">💫</span>
        <h1>Fim de Jogo!</h1>
        <div class="final-score">⭐ Estrelas: <span id="final-score">0</span></div>
        <button class="btn-restart" onclick="reiniciarJogo()">🔄 Jogar Novamente</button>
    </div>
    
    <!-- CANVAS -->
    <canvas id="gameCanvas"></canvas>
    
    <script>
        // ============================================================
        //  CANVAS
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let W, H;
        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // ============================================================
        //  ESTADO DO JOGO
        // ============================================================
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let frameCount = 0;
        let starSpawnTimer = 0;
        let obstacleSpawnTimer = 0;
        let particles = [];
        let animId = null;
        let gameLoopId = null;
        
        // ============================================================
        //  PÉROLA
        // ============================================================
        const perola = {
            x: 100,
            y: 0,
            largura: 70,
            altura: 80,
            velocidadeY: 0,
            gravidade: 0.55,
            pulo: -13,
            noChao: false,
            visivel: true,
            
            reset() {
                this.x = 100;
                this.y = H - 180;
                this.velocidadeY = 0;
                this.noChao = false;
                this.visivel = true;
            },
            
            desenhar() {
                if (!this.visivel) return;
                
                ctx.save();
                
                // Sombra no chão
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetY = 8;
                
                // VESTIDO
                const gradVestido = ctx.createRadialGradient(
                    this.x + 20, this.y + 30, 5,
                    this.x + 35, this.y + 50, 45
                );
                gradVestido.addColorStop(0, '#FF8A8A');
                gradVestido.addColorStop(0.4, '#FF6B6B');
                gradVestido.addColorStop(1, '#E74C6F');
                
                ctx.beginPath();
                ctx.ellipse(
                    this.x + this.largura/2,
                    this.y + this.altura * 0.55,
                    this.largura * 0.38,
                    this.altura * 0.42,
                    0, 0, Math.PI * 2
                );
                ctx.fillStyle = gradVestido;
                ctx.fill();
                ctx.strokeStyle = '#CC4466';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Laço no vestido
                ctx.shadowBlur = 5;
                ctx.fillStyle = '#FF6B8A';
                ctx.beginPath();
                ctx.ellipse(this.x + this.largura/2 - 10, this.y + 30, 8, 5, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(this.x + this.largura/2 + 10, this.y + 30, 8, 5, 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(this.x + this.largura/2, this.y + 30, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // CABEÇA
                ctx.shadowBlur = 8;
                const cabecaX = this.x + this.largura/2;
                const cabecaY = this.y + 22;
                const raio = 25;
                
                const gradCabeca = ctx.createRadialGradient(
                    cabecaX - 4, cabecaY - 4, 3,
                    cabecaX, cabecaY, raio
                );
                gradCabeca.addColorStop(0, '#FFD5C2');
                gradCabeca.addColorStop(1, '#F5C4A8');
                
                ctx.beginPath();
                ctx.arc(cabecaX, cabecaY, raio, 0, Math.PI * 2);
                ctx.fillStyle = gradCabeca;
                ctx.fill();
                ctx.strokeStyle = '#E8B89A';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // CABELO
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#8B4513';
                // Cabelo topo
                ctx.beginPath();
                ctx.arc(cabecaX - 8, cabecaY - 16, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cabecaX + 8, cabecaY - 16, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cabecaX, cabecaY - 20, 16, 0, Math.PI * 2);
                ctx.fill();
                // Rabo de cavalo
                ctx.beginPath();
                ctx.ellipse(cabecaX + 18, cabecaY - 8, 8, 15, 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cabecaX + 22, cabecaY - 2, 5, 10, 0.7, 0, Math.PI * 2);
                ctx.fill();
                // Laço no cabelo
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(cabecaX + 20, cabecaY - 14, 6, 4, 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cabecaX + 26, cabecaY - 12, 6, 4, -0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // OLHOS
                ctx.shadowBlur = 0;
                // Branco dos olhos
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.ellipse(cabecaX - 9, cabecaY - 2, 7, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cabecaX + 9, cabecaY - 2, 7, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Íris
                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.arc(cabecaX - 7, cabecaY - 1, 4.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cabecaX + 11, cabecaY - 1, 4.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Brilho nos olhos
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(cabecaX - 8, cabecaY - 4, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cabecaX + 10, cabecaY - 4, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // PESTANAS
                ctx.strokeStyle = '#2C3E50';
                ctx.lineWidth = 1.5;
                for (let i = -2; i <= 2; i++) {
                    ctx.beginPath();
                    ctx.moveTo(cabecaX - 13 + i*2, cabecaY - 8 + Math.abs(i)*2);
                    ctx.lineTo(cabecaX - 16 + i*3, cabecaY - 12 + Math.abs(i)*3);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(cabecaX + 7 + i*2, cabecaY - 8 + Math.abs(i)*2);
                    ctx.lineTo(cabecaX + 4 + i*3, cabecaY - 12 + Math.abs(i)*3);
                    ctx.stroke();
                }
                
                // BOCA (sorriso)
                ctx.beginPath();
                ctx.arc(cabecaX, cabecaY + 7, 9, 0.1, Math.PI - 0.1);
                ctx.strokeStyle = '#CC4466';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // LÍNGUA
                ctx.fillStyle = '#FF6B8A';
                ctx.beginPath();
                ctx.arc(cabecaX, cabecaY + 10, 4, 0, Math.PI);
                ctx.fill();
                
                // BOCHECHAS
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(cabecaX - 16, cabecaY + 5, 6, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cabecaX + 16, cabecaY + 5, 6, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                // BRAÇOS
                ctx.shadowBlur = 4;
                ctx.fillStyle = '#F5C4A8';
                // Braço esquerdo
                ctx.beginPath();
                ctx.ellipse(this.x + 8, this.y + 45, 7, 12, 0.3, 0, Math.PI * 2);
                ctx.fill();
                // Braço direito
                ctx.beginPath();
                ctx.ellipse(this.x + this.largura - 8, this.y + 45, 7, 12, -0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // MÃOS
                ctx.fillStyle = '#F5C4A8';
                ctx.beginPath();
                ctx.arc(this.x + 4, this.y + 52, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + this.largura - 4, this.y + 52, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // SAPATOS
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(this.x + 12, this.y + this.altura - 2, 12, 6, 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(this.x + this.largura - 12, this.y + this.altura - 2, 12, 6, -0.2, 0, Math.PI * 2);
                ctx.fill();
                
                // MEIAS
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.ellipse(this.x + 12, this.y + this.altura - 8, 8, 6, 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(this.x + this.largura - 12, this.y + this.altura - 8, 8, 6, -0.2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
            }
        };
        
        // ============================================================
        //  ESTRELAS
        // ============================================================
        class Estrela {
            constructor() {
                this.x = W + 50;
                this.y = Math.random() * (H - 250) + 100;
                this.raio = 18 + Math.random() * 10;
                this.velocidade = 2 + Math.random() * 2.5;
                this.brilho = 1;
                this.rotacao = Math.random() * Math.PI * 2;
                this.coletada = false;
                this.tipo = Math.random() > 0.75 ? 'dourada' : 'normal';
                this.tamanho = this.tipo === 'dourada' ? 1.4 : 1;
                this.pulos = 0;
            }
            
            desenhar() {
                if (this.coletada) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotacao);
                ctx.scale(this.tamanho, this.tamanho);
                
                // Brilho externo
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.raio * 2);
                const corBase = this.tipo === 'dourada' ? '255,215,0' : '255,215,0';
                grad.addColorStop(0, `rgba(${corBase},${0.2 * this.brilho})`);
                grad.addColorStop(0.5, `rgba(${corBase},${0.1 * this.brilho})`);
                grad.addColorStop(1, `rgba(${corBase},0)`);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, this.raio * 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Estrela
                const points = 5;
                const outerRadius = this.raio;
                const innerRadius = this.raio * 0.4;
                
                ctx.beginPath();
                for (let i = 0; i < points * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                
                const cor = this.tipo === 'dourada' ? '#FFD700' : '#FFD700';
                const gradEstrela = ctx.createRadialGradient(-3, -3, 0, 0, 0, this.raio);
                if (this.tipo === 'dourada') {
                    gradEstrela.addColorStop(0, '#FFE066');
                    gradEstrela.addColorStop(0.5, '#FFD700');
                    gradEstrela.addColorStop(1, '#FFA500');
                } else {
                    gradEstrela.addColorStop(0, '#FFE066');
                    gradEstrela.addColorStop(0.5, '#FFD700');
                    gradEstrela.addColorStop(1, '#FFA500');
                }
                ctx.fillStyle = gradEstrela;
                ctx.fill();
                ctx.strokeStyle = this.tipo === 'dourada' ? '#FF8C00' : '#FFA500';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                // Brilho
                if (this.brilho > 0.6) {
                    ctx.shadowColor = this.tipo === 'dourada' ? 'rgba(255,215,0,0.6)' : 'rgba(255,215,0,0.3)';
                    ctx.shadowBlur = 25;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                
                // Olhos na estrela (fofo)
                if (this.tipo === 'dourada') {
                    ctx.fillStyle = '#2C3E50';
                    ctx.beginPath();
                    ctx.arc(-4, -3, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(4, -3, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(-3.5, -4, 1, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(4.5, -4, 1, 0, Math.PI * 2);
                    ctx.fill();
                    // Sorriso
                    ctx.beginPath();
                    ctx.arc(0, 2, 4, 0.1, Math.PI - 0.1);
                    ctx.strokeStyle = '#2C3E50';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                ctx.restore();
            }
            
            atualizar() {
                if (this.coletada) return;
                this.x -= this.velocidade;
                this.rotacao += 0.04;
                this.brilho = 0.6 + Math.sin(frameCount * 0.05 + this.x * 0.01) * 0.4;
                this.y += Math.sin(frameCount * 0.02 + this.x * 0.005) * 0.3;
            }
            
            coletar() {
                this.coletada = true;
                const cor = this.tipo === 'dourada' ? '#FFD700' : '#FFD700';
                criarExplosao(this.x, this.y, cor, this.tipo === 'dourada' ? 30 : 20);
                score += this.tipo === 'dourada' ? 5 : 1;
                document.getElementById('score').textContent = score;
            }
        }
        
        // ============================================================
        //  OBSTÁCULOS (Fofos)
        // ============================================================
        class Obstaculo {
            constructor() {
                this.x = W + 50;
                this.y = H - 170 - Math.random() * 80;
                this.largura = 35 + Math.random() * 25;
                this.altura = 35 + Math.random() * 25;
                this.velocidade = 2.5 + Math.random() * 2;
                this.tipo = Math.random() > 0.5 ? 'espinho' : 'agua_viva';
                this.rotacao = 0;
                this.animOffset = Math.random() * Math.PI * 2;
                this.pulos = 0;
            }
            
            desenhar() {
                ctx.save();
                ctx.translate(this.x + this.largura/2, this.y + this.altura/2);
                ctx.rotate(this.rotacao);
                
                if (this.tipo === 'espinho') {
                    // Estrela do mar vermelha (fofa)
                    const points = 5;
                    const outerRadius = this.largura/2;
                    const innerRadius = outerRadius * 0.35;
                    
                    ctx.beginPath();
                    for (let i = 0; i < points * 2; i++) {
                        const radius = i % 2 === 0 ? outerRadius : innerRadius;
                        const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    
                    const grad = ctx.createRadialGradient(-3, -3, 0, 0, 0, outerRadius);
                    grad.addColorStop(0, '#FF6B8A');
                    grad.addColorStop(0.5, '#FF4757');
                    grad.addColorStop(1, '#C0392B');
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.strokeStyle = '#A93226';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Olhos tristes
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(-7, -4, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(7, -4, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#2C3E50';
                    ctx.beginPath();
                    ctx.arc(-6, -3, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(8, -3, 3, 0, Math.PI * 2);
                    ctx.fill();
                    // Lágrima
                    ctx.fillStyle = 'rgba(100,200,255,0.5)';
                    ctx.beginPath();
                    ctx.ellipse(-6, 3, 2, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(8, 3, 2, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                } else {
                    // Água-viva fofa
                    const grad = ctx.createRadialGradient(0, -5, 0, 0, 0, this.largura/2);
                    grad.addColorStop(0, 'rgba(200,230,255,0.4)');
                    grad.addColorStop(0.5, 'rgba(150,200,255,0.3)');
                    grad.addColorStop(1, 'rgba(100,150,255,0.15)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.largura/2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(150,200,255,0.3)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    // Tentáculos dançantes
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 + this.animOffset;
                        const length = 18 + Math.sin(frameCount * 0.04 + i * 1.2) * 8;
                        ctx.beginPath();
                        ctx.moveTo(Math.cos(angle) * this.largura/2 * 0.5, 
                                  Math.sin(angle) * this.largura/2 * 0.5);
                        ctx.quadraticCurveTo(
                            Math.cos(angle) * (this.largura/2 + length * 0.4),
                            Math.sin(angle) * (this.largura/2 + length * 0.4) + 8,
                            Math.cos(angle) * (this.largura/2 + length),
                            Math.sin(angle) * (this.largura/2 + length) + 15
                        );
                        ctx.strokeStyle = `rgba(150,200,255,${0.2 + Math.sin(frameCount * 0.03 + i) * 0.1})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    
                    // Olhos fofos
                    ctx.fillStyle = '#2C3E50';
                    ctx.beginPath();
                    ctx.arc(-6, -3, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(6, -3, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(-5, -4, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(7, -4, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    // Sorriso
                    ctx.beginPath();
                    ctx.arc(0, 3, 5, 0.1, Math.PI - 0.1);
                    ctx.strokeStyle = '#2C3E50';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                ctx.restore();
            }
            
            atualizar() {
                this.x -= this.velocidade;
                this.rotacao += 0.02;
                this.animOffset += 0.04;
            }
            
            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.largura,
                    height: this.altura
                };
            }
        }
        
        // ============================================================
        //  PARTÍCULAS
        // ============================================================
        function criarExplosao(x, y, cor, quantidade = 15) {
            for (let i = 0; i < quantidade; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 4;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    life: 1,
                    decay: 0.008 + Math.random() * 0.02,
                    radius: 2 + Math.random() * 5,
                    cor: cor || '#FFD700',
                    tipo: 'estrela'
                });
            }
        }
        
        function criarSalpico(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6 - 3,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.02,
                    radius: 2 + Math.random() * 4,
                    cor: '#87CEEB',
                    tipo: 'agua'
                });
            }
        }
        
        function atualizarParticulas() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.life -= p.decay;
                p.radius *= 0.99;
                
                if (p.life <= 0 || p.radius < 0.3) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function desenharParticulas() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life * 0.8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.cor;
                ctx.shadowColor = p.cor;
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });
        }
        
        // ============================================================
        //  LISTAS
        // ============================================================
        let estrelas = [];
        let obstaculos = [];
        
        // ============================================================
        //  COLISÕES
        // ============================================================
        function rectCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }
        
        function verificarColisoes() {
            const perolaBounds = {
                x: perola.x + 12,
                y: perola.y + 12,
                width: perola.largura - 24,
                height: perola.altura - 24
            };
            
            for (let i = estrelas.length - 1; i >= 0; i--) {
                const estrela = estrelas[i];
                if (estrela.coletada) continue;
                
                const dx = (perola.x + perola.largura/2) - estrela.x;
                const dy = (perola.y + perola.altura/2) - estrela.y;
                const distancia = Math.sqrt(dx*dx + dy*dy);
                
                if (distancia < estrela.raio * estrela.tamanho + 25) {
                    estrela.coletar();
                    estrelas.splice(i, 1);
                }
            }
            
            for (let i = obstaculos.length - 1; i >= 0; i--) {
                const obs = obstaculos[i];
                const obsBounds = obs.getBounds();
                
                if (rectCollision(perolaBounds, obsBounds)) {
                    perderVida();
                    obstaculos.splice(i, 1);
                    criarExplosao(obs.x + obs.largura/2, obs.y + obs.altura/2, '#FF4757', 20);
                    return;
                }
            }
        }
        
        // ============================================================
        //  VIDA
        // ============================================================
        function perderVida() {
            lives--;
            document.getElementById('lives').textContent = lives;
            criarExplosao(perola.x + perola.largura/2, perola.y + perola.altura/2, '#FF6B6B', 25);
            
            if (lives <= 0) {
                gameOver();
            } else {
                perola.reset();
                perola.y = H - 180;
                let blinkCount = 0;
                const blinkInterval = setInterval(() => {
                    perola.visivel = !perola.visivel;
                    blinkCount++;
                    if (blinkCount > 6) {
                        clearInterval(blinkInterval);
                        perola.visivel = true;
                    }
                }, 200);
            }
        }
        
        // ============================================================
        //  GAME OVER
        // ============================================================
        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').classList.add('show');
            if (animId) {
                cancelAnimationFrame(animId);
                animId = null;
            }
        }
        
        function reiniciarJogo() {
            document.getElementById('game-over').classList.remove('show');
            startGame();
        }
        
        // ============================================================
        //  CONTROLES
        // ============================================================
        function toggleControls() {
            const info = document.getElementById('controls-info');
            info.style.display = info.style.display === 'none' ? 'block' : 'none';
        }
        
        // ============================================================
        //  INICIAR JOGO
        // ============================================================
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('controls-info').style.display = 'none';
            
            score = 0;
            lives = 3;
            frameCount = 0;
            estrelas = [];
            obstaculos = [];
            particles = [];
            
            document.getElementById('score').textContent = '0';
            document.getElementById('lives').textContent = '3';
            
            perola.reset();
            perola.y = H - 180;
            perola.visivel = true;
            
            gameRunning = true;
            
            if (animId) {
                cancelAnimationFrame(animId);
                animId = null;
            }
            loop();
        }
        
        // ============================================================
        //  LOOP PRINCIPAL
        // ============================================================
        function loop() {
            if (!gameRunning) {
                animId = requestAnimationFrame(loop);
                return;
            }
            
            frameCount++;
            atualizarJogo();
            desenharJogo();
            animId = requestAnimationFrame(loop);
        }
        
        function atualizarJogo() {
            // Física da Pérola
            perola.velocidadeY += perola.gravidade;
            perola.y += perola.velocidadeY;
            
            const chao = H - 170;
            if (perola.y + perola.altura > chao) {
                perola.y = chao - perola.altura;
                perola.velocidadeY = 0;
                perola.noChao = true;
            } else {
                perola.noChao = false;
            }
            
            if (perola.x < 0) perola.x = 0;
            if (perola.x + perola.largura > W) perola.x = W - perola.largura;
            
            // Spawn
            starSpawnTimer++;
            if (starSpawnTimer > 50 - Math.min(score / 8, 20)) {
                starSpawnTimer = 0;
                if (Math.random() > 0.35) {
                    estrelas.push(new Estrela());
                }
            }
            
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer > 100 - Math.min(score / 4, 40)) {
                obstacleSpawnTimer = 0;
                if (Math.random() > 0.45) {
                    obstaculos.push(new Obstaculo());
                }
            }
            
            // Atualizar objetos
            for (let i = estrelas.length - 1; i >= 0; i--) {
                estrelas[i].atualizar();
                if (estrelas[i].x < -50) estrelas.splice(i, 1);
            }
            
            for (let i = obstaculos.length - 1; i >= 0; i--) {
                obstaculos[i].atualizar();
                if (obstaculos[i].x < -50) obstaculos.splice(i, 1);
            }
            
            verificarColisoes();
            atualizarParticulas();
        }
        
        function desenharJogo() {
            ctx.clearRect(0, 0, W, H);
            
            // Céu
            const gradCeu = ctx.createLinearGradient(0, 0, 0, H);
            gradCeu.addColorStop(0, '#87CEEB');
            gradCeu.addColorStop(0.3, '#4A90D9');
            gradCeu.addColorStop(0.6, '#2C5F8A');
            gradCeu.addColorStop(1, '#1A3A5A');
            ctx.fillStyle = gradCeu;
            ctx.fillRect(0, 0, W, H);
            
            // Sol
            ctx.shadowColor = 'rgba(255,200,50,0.2)';
            ctx.shadowBlur = 50;
            ctx.beginPath();
            ctx.arc(W - 80, 80, 45, 0, Math.PI * 2);
            const gradSol = ctx.createRadialGradient(W - 80, 80, 0, W - 80, 80, 45);
            gradSol.addColorStop(0, '#FFE066');
            gradSol.addColorStop(0.5, '#FFD700');
            gradSol.addColorStop(1, '#FFA500');
            ctx.fillStyle = gradSol;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Nuvens
            desenharNuvens();
            
            // Chão
            const chao = H - 170;
            const gradChao = ctx.createLinearGradient(0, chao, 0, H);
            gradChao.addColorStop(0, '#F4A460');
            gradChao.addColorStop(0.15, '#D2691E');
            gradChao.addColorStop(0.4, '#8B4513');
            gradChao.addColorStop(1, '#2C1810');
            ctx.fillStyle = gradChao;
            ctx.fillRect(0, chao, W, H - chao);
            
            // Grama
            ctx.strokeStyle = 'rgba(34,139,34,0.3)';
            ctx.lineWidth = 2;
            for (let i = 0; i < W; i += 8) {
                const altura = 5 + Math.sin(i * 0.3 + frameCount * 0.02) * 3;
                ctx.beginPath();
                ctx.moveTo(i, chao);
                ctx.lineTo(i + 2, chao - altura);
                ctx.stroke();
            }
            
            desenharBolhas();
            desenharAlgas();
            
            estrelas.forEach(e => e.desenhar());
            obstaculos.forEach(o => o.desenhar());
            perola.desenhar();
            desenharParticulas();
        }
        
        // ============================================================
        //  DECORAÇÕES
        // ============================================================
        let nuvens = [];
        for (let i = 0; i < 6; i++) {
            nuvens.push({
                x: Math.random() * W,
                y: 15 + Math.random() * 80,
                width: 80 + Math.random() * 120,
                speed: 0.15 + Math.random() * 0.25,
                opacity: 0.25 + Math.random() * 0.3
            });
        }
        
        function desenharNuvens() {
            nuvens.forEach(n => {
                n.x += n.speed;
                if (n.x > W + n.width) n.x = -n.width;
                
                ctx.globalAlpha = n.opacity;
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(255,255,255,0.1)';
                
                ctx.beginPath();
                ctx.ellipse(n.x, n.y, n.width/2.5, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(n.x - n.width/4, n.y + 8, n.width/3.5, 22, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(n.x + n.width/4, n.y + 8, n.width/3.5, 22, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });
        }
        
        let bolhas = [];
        for (let i = 0; i < 25; i++) {
            bolhas.push({
                x: Math.random() * W,
                y: Math.random() * H,
                raio: 2 + Math.random() * 4,
                speed: 0.15 + Math.random() * 0.25,
                offset: Math.random() * Math.PI * 2
            });
        }
        
        function desenharBolhas() {
            bolhas.forEach(b => {
                b.y -= b.speed;
                b.x += Math.sin(frameCount * 0.02 + b.offset) * 0.15;
                if (b.y < -10) {
                    b.y = H + 10;
                    b.x = Math.random() * W;
                }
                
                ctx.globalAlpha = 0.15;
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.raio, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            });
        }
        
        function desenharAlgas() {
            const chao = H - 170;
            const algas = [
                { x: 30, altura: 70, offset: 0 },
                { x: 90, altura: 50, offset: 1.2 },
                { x: W - 60, altura: 80, offset: 2.5 },
                { x: W - 130, altura: 60, offset: 3.7 },
                { x: 160, altura: 45, offset: 4.9 },
                { x: W - 200, altura: 55, offset: 6.1 }
            ];
            
            algas.forEach(a => {
                ctx.beginPath();
                ctx.moveTo(a.x, chao);
                
                const altura = a.altura + Math.sin(frameCount * 0.025 + a.offset) * 8;
                ctx.quadraticCurveTo(
                    a.x - 12 + Math.sin(frameCount * 0.02 + a.offset) * 6,
                    chao - altura * 0.5,
                    a.x + Math.sin(frameCount * 0.025 + a.offset * 1.3) * 4,
                    chao - altura
                );
                ctx.strokeStyle = 'rgba(34,139,34,0.35)';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(a.x + 15, chao);
                ctx.quadraticCurveTo(
                    a.x + 28 + Math.sin(frameCount * 0.02 + a.offset * 1.1) * 6,
                    chao - altura * 0.6,
                    a.x + 15 + Math.sin(frameCount * 0.03 + a.offset * 1.7) * 4,
                    chao - altura * 0.85
                );
                ctx.strokeStyle = 'rgba(34,139,34,0.25)';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }
        
        // ============================================================
        //  CONTROLES - TECLADO E TOQUE
        // ============================================================
        const keys = {};
        
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if ((e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w' || e.key === 'W') && 
                perola.noChao && gameRunning) {
                e.preventDefault();
                perola.velocidadeY = perola.pulo;
                perola.noChao = false;
                criarSalpico(perola.x + perola.largura/2, perola.y + perola.altura);
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // TOUCH
        let touchX = null;
        let touchY = null;
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchX = touch.clientX - rect.left;
            touchY = touch.clientY - rect.top;
            
            if (perola.noChao && gameRunning) {
                perola.velocidadeY = perola.pulo;
                perola.noChao = false;
                criarSalpico(perola.x + perola.largura/2, perola.y + perola.altura);
            }
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!gameRunning) return;
            
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const currentX = touch.clientX - rect.left;
            
            if (touchX !== null) {
                const diff = currentX - touchX;
                perola.x += diff * 0.7;
                if (perola.x < 0) perola.x = 0;
                if (perola.x + perola.largura > W) perola.x = W - perola.largura;
                touchX = currentX;
            }
        }, { passive: false });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchX = null;
            touchY = null;
        }, { passive: false });
        
        // Movimento contínuo
        setInterval(() => {
            if (!gameRunning) return;
            
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                perola.x += 5;
                if (perola.x + perola.largura > W) perola.x = W - perola.largura;
            }
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                perola.x -= 5;
                if (perola.x < 0) perola.x = 0;
            }
        }, 16);
        
        // ============================================================
        //  REDIMENSIONAR
        // ============================================================
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (perola.y + perola.altura > H - 170) {
                perola.y = H - 170 - perola.altura;
            }
        });
        
        // ============================================================
        //  INICIAR
        // ============================================================
        console.log('🌊 As Aventuras de Pérola');
        console.log('🎮 Use as setas ou WASD para mover');
        console.log('⬆️ Espaço ou clique para pular');
        console.log('⭐ Colete estrelas douradas e desvie dos obstáculos!');
        
        perola.y = H - 180;
        perola.reset();
        
        // Loop da tela inicial
        function startScreenLoop() {
            if (!gameRunning && document.getElementById('start-screen').style.display !== 'none') {
                ctx.clearRect(0, 0, W, H);
                const gradCeu = ctx.createLinearGradient(0, 0, 0, H);
                gradCeu.addColorStop(0, '#87CEEB');
                gradCeu.addColorStop(0.5, '#4A90D9');
                gradCeu.addColorStop(1, '#2C5F8A');
                ctx.fillStyle = gradCeu;
                ctx.fillRect(0, 0, W, H);
                perola.desenhar();
                desenharNuvens();
                desenharBolhas();
                requestAnimationFrame(startScreenLoop);
            }
        }
        startScreenLoop();
        
        console.log('✅ Jogo carregado! Divirta-se! 🎉');
    </script>
</body>
</html>
